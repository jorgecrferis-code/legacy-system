<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:40px;">

<h2>LEGACY LOGIN</h2>

<input id="user" placeholder="User" style="width:100%; padding:10px;"><br><br>
<input id="pass" placeholder="Password" type="password" style="width:100%; padding:10px;"><br><br>

<button onclick="login()" style="padding:12px 20px;">LOGIN</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function login(){
  const user = document.getElementById('user').value;
  const pass = document.getElementById('pass').value;

  let { data } = await supabase
    .from('users')
    .select('*')
    .eq('name', user)
    .eq('password', pass)
    .single();

  if(!data){
    alert('Login failed');
    return;
  }

  localStorage.setItem("user", data.name);
  localStorage.setItem("role", data.role);

  window.location.href = "index.html";
}
</script>

</body>
</html>
