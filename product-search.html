<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PRODUCT SEARCH</h2>

<label><b>Customer:</b></label><br>
<select id="customer" onchange="loadCustomer()" style="width:100%; padding:10px;"></select>

<br><br>

<input
  type="text"
  id="search"
  placeholder="Search product..."
  style="width:100%; padding:10px;"
  onkeyup="searchProducts()"
/>

<br><br>

<div id="results">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let customers = [];
let selectedCustomer = null;

async function loadCustomers() {
  let { data } = await supabase
    .from('customers')
    .select('*')
    .order('customer_name');

  customers = data || [];

  let select = document.getElementById('customer');
  select.innerHTML = '<option value="">Select customer</option>';

  customers.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.customer_name}</option>`;
  });
}

function loadCustomer() {
  let id = document.getElementById('customer').value;
  selectedCustomer = customers.find(c => String(c.id) === String(id)) || null;
  searchProducts();
}

async function getPrice(productId) {
  if (!selectedCustomer || !selectedCustomer.price_table) return 0;

  let { data } = await supabase
    .from('product_prices')
    .select('*')
    .eq('product_id', productId)
    .eq('price_table', selectedCustomer.price_table)
    .limit(1);

  if (!data || data.length === 0) return 0;

  return Number(data[0].price_box || 0);
}

async function searchProducts() {
  let search = document.getElementById('search').value;

  let query = supabase
    .from('inventory_summary')
    .select('*')
    .order('name')
    .limit(30);

  if (search) {
    query = query.ilike('name', '%' + search + '%');
  }

  let { data, error } = await query;

  if (error) {
    document.getElementById('results').innerHTML = error.message;
    return;
  }

  let html = '';

  for (let p of (data || [])) {
    let price = await getPrice(p.product_id);

    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        <b>${p.name}</b><br>
        Price: <b>$${price.toFixed(2)}</b><br>
        Available: <b>${Number(p.available || 0)}</b><br>
        On Order: ${Number(p.on_order || 0)}<br>
        Box Weight: ${p.box_weight || '-'}<br>
        Type: ${p.frozen_fresh || '-'}<br>
        Next Expiration: ${p.next_expiration || '-'}
      </div>
    `;
  }

  document.getElementById('results').innerHTML = html || 'No products found';
}

loadCustomers();
searchProducts();
</script>

</body>
</html>
