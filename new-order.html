<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>NEW ORDER</h2>

Customer:<br>
<input id="customer" style="width:300px"><br><br>

Notes:<br>
<input id="notes" style="width:300px"><br><br>

<h3>Add Items</h3>

Product:<br>
<select id="product"></select><br><br>

Qty:<br>
<input id="qty" type="number"><br><br>

<button onclick="addItem()">Add Item</button>

<h3>Items</h3>
<div id="items"></div><br>

<button onclick="saveOrder()">SAVE ORDER</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "COLE_SUA_ANON_AQUI";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let items = [];

loadProducts();

async function loadProducts() {
  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .order("name_en");

  const select = document.getElementById("product");
  select.innerHTML = "";

  let added = {};

  data.forEach(p => {
    if(!added[p.id]) {
      let option = document.createElement("option");
      option.value = p.id;
      option.text = p.name_en + " (" + (p.name_pt || "") + " / " + (p.name_es || "") + ")";
      select.appendChild(option);
      added[p.id] = true;
    }
  });
}

function addItem() {
  const productId = document.getElementById("product").value;
  const productText = document.getElementById("product").selectedOptions[0].text;
  const qty = document.getElementById("qty").value;

  items.push({ product_id: productId, name: productText, qty: qty });

  renderItems();
}

function renderItems() {
  let html = "";
  items.forEach(i => {
    html += i.qty + " - " + i.name + "<br>";
  });
  document.getElementById("items").innerHTML = html;
}

async function saveOrder() {
  const customer = document.getElementById("customer").value;
  const notes = document.getElementById("notes").value;

  const { data, error } = await supabaseClient
    .from("orders")
    .insert([{ customer_name: customer, notes: notes, status: "waiting" }])
    .select()
    .single();

  const orderId = data.id;

  for (const item of items) {
    await supabaseClient.from("order_items").insert([
      {
        order_id: orderId,
        product_id: item.product_id,
        qty: item.qty
      }
    ]);
  }

  alert("Order Saved!");
  location.reload();
}
</script>

</body>
</html>
