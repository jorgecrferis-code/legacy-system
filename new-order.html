<script>
async function saveOrder() {

  const customer = document.getElementById("customer").value;

  // criar order
  let { data: order } = await supabase
    .from("orders")
    .insert([
      { customer_name: customer, status: "waiting" }
    ])
    .select()
    .single();

  const orderId = order.id;

  // pegar itens da tela
  for (const item of cart) {

    // salvar order_items
    await supabase
      .from("order_items")
      .insert([
        {
          order_id: orderId,
          product_id: item.product_id,
          qty: item.qty,
          price: item.price
        }
      ]);

    // pegar estoque atual
    let { data: product } = await supabase
      .from("products")
      .select("stock")
      .eq("id", item.product_id)
      .single();

    let newStock = Number(product.stock) - Number(item.qty);

    // atualizar estoque
    await supabase
      .from("products")
      .update({ stock: newStock })
      .eq("id", item.product_id);

    // criar transação inventory
    await supabase
      .from("inventory_transactions")
      .insert([
        {
          product_id: item.product_id,
          qty: item.qty,
          type: "SALE",
          reference: "ORDER " + orderId
        }
      ]);
  }

  alert("Order Saved and Inventory Updated!");
  window.location.href = "orders-waiting-picking.html";
}
</script>
