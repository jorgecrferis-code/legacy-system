<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "COLE_SUA_ANON_AQUI";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let items = [];

loadProducts();

async function loadProducts() {
    const { data, error } = await supabase
        .from('products')
        .select('*')
        .order('name');

    if (error) {
        alert(error.message);
        return;
    }

    const select = document.getElementById("product");
    select.innerHTML = "";

    data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.name;
        option.text = p.name;
        select.appendChild(option);
    });
}

function addItem() {
    const product = document.getElementById("product").value;
    const qty = document.getElementById("qty").value;

    if (!product || !qty) return;

    items.push({
        product: product,
        qty: qty
    });

    renderItems();
}

function renderItems() {
    const div = document.getElementById("items");
    div.innerHTML = "";

    items.forEach(i => {
        div.innerHTML += i.product + " - " + i.qty + "<br>";
    });
}

async function saveOrder() {
    const customer = document.getElementById("customer").value;
    const notes = document.getElementById("notes").value;

    const { data: order, error } = await supabase
        .from('orders')
        .insert([{ customer_name: customer, notes: notes, status: 'waiting picking' }])
        .select()
        .single();

    if (error) {
        alert(error.message);
        return;
    }

    for (let item of items) {
        await supabase.from('order_items').insert([{
            order_id: order.id,
            product_name: item.product,
            qty: item.qty,
            picked: 0
        }]);
    }

    window.location.href = "/orders-waiting-picking.html";
}
</script>
