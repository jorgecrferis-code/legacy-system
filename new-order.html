<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>NEW ORDER</h2>

Customer:<br>
<input type="text" id="customer"><br><br>

Notes:<br>
<input type="text" id="notes"><br><br>

<h3>Add Items</h3>

Product:<br>
<input type="text" id="product"><br>
Qty:<br>
<input type="number" id="qty"><br><br>

<button onclick="addItem()">Add Item</button>

<h3>Items</h3>
<div id="items"></div>

<br>
<button onclick="saveOrder()">SAVE ORDER</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/script.js"></script>

<script>
let items = [];

function addItem() {
  const product = document.getElementById("product").value;
  const qty = document.getElementById("qty").value;

  items.push({ product, qty });

  renderItems();
}

function renderItems() {
  let html = "";
  items.forEach(i => {
    html += i.product + " - " + i.qty + "<br>";
  });
  document.getElementById("items").innerHTML = html;
}

async function saveOrder() {
  const customer = document.getElementById("customer").value;
  const notes = document.getElementById("notes").value;

  const order = await createOrder(customer, notes);

  for (let i of items) {
    await addOrderItem(order.id, i.product, i.qty);
  }

  alert("Order Created!");
  window.location.href = "orders-waiting-picking.html";
}
</script>

</body>
</html>
