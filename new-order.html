<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>NEW ORDER</h2>

<label>Customer:</label>
<select id="customer"></select>

<br><br>

<input type="text" id="productSearch" placeholder="Search product..." onkeyup="searchProducts()">

<div id="productList"></div>

<h3>Order Items</h3>
<div id="orderItems"></div>

<br>
<button onclick="submitOrder()">SUBMIT ORDER</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "SUA_ANON_AQUI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let orderItems = [];

async function loadCustomers() {
  let { data } = await supabase.from('customers').select('*').order('customer_name');

  let select = document.getElementById('customer');
  data.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.customer_name}</option>`;
  });
}

async function searchProducts() {
  let search = document.getElementById('productSearch').value;

  let { data } = await supabase
    .from('products')
    .select('*')
    .ilike('name', '%' + search + '%')
    .limit(10);

  let html = "";

  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        ${p.name}
        <button onclick="addItem(${p.id}, '${p.name}')">Add</button>
      </div>
    `;
  });

  document.getElementById('productList').innerHTML = html;
}

function addItem(id, name) {
  orderItems.push({ product_id: id, name: name, qty: 1 });
  renderItems();
}

function renderItems() {
  let html = "";
  orderItems.forEach((item, index) => {
    html += `
      <div>
        ${item.name}
        Qty:
        <input type="number" value="${item.qty}" onchange="updateQty(${index}, this.value)">
      </div>
    `;
  });
  document.getElementById('orderItems').innerHTML = html;
}

function updateQty(index, qty) {
  orderItems[index].qty = qty;
}

async function submitOrder() {
  let customer_id = document.getElementById('customer').value;

  let { data: order } = await supabase
    .from('orders')
    .insert([{ customer_id: customer_id, status: 'new' }])
    .select()
    .single();

  for (let item of orderItems) {
    await supabase.from('order_items').insert([
      {
        order_id: order.id,
        product_id: item.product_id,
        qty_boxes: item.qty
      }
    ]);
  }

  alert("Order Created!");
}

loadCustomers();
</script>

</body>
</html>
