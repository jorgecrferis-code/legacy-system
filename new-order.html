<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>NEW ORDER</h2>

<label><b>Customer:</b></label><br>
<select id="customer" onchange="customerChanged()" style="width:100%; padding:10px; font-size:16px;"></select>

<br><br>

<div id="customerInfo" style="background:white; border:1px solid #ddd; padding:15px; border-radius:8px;">
  Select a customer
</div>

<br>

<input
  type="text"
  id="productSearch"
  placeholder="Search product..."
  style="width:100%; padding:10px; font-size:16px;"
  onkeyup="searchProducts()"
/>

<div id="productList" style="margin-top:15px;"></div>

<h3>ORDER ITEMS</h3>
<div id="orderItems"></div>

<h3 id="grandTotal">Grand Total: $0.00</h3>

<br>
<button onclick="submitOrder()" style="padding:12px 20px; font-size:16px;">SUBMIT ORDER</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let customers = [];
let selectedCustomer = null;
let orderItems = [];

async function loadCustomers() {
  let { data, error } = await supabase
    .from('customers')
    .select('*')
    .order('customer_name');

  if (error) {
    alert(error.message);
    return;
  }

  customers = data || [];

  let select = document.getElementById('customer');
  select.innerHTML = '<option value="">Select customer</option>';

  customers.forEach(c => {
    select.innerHTML += `<option value="${c.id}">${c.customer_name}</option>`;
  });
}

function customerChanged() {
  let customerId = document.getElementById('customer').value;
  selectedCustomer = customers.find(c => String(c.id) === String(customerId)) || null;

  let info = document.getElementById('customerInfo');

  if (!selectedCustomer) {
    info.innerHTML = 'Select a customer';
    return;
  }

  info.innerHTML = `
    <b>${selectedCustomer.customer_name || ''}</b><br>
    Address: ${selectedCustomer.address || ''} ${selectedCustomer.city || ''} ${selectedCustomer.state || ''}<br>
    Phone: ${selectedCustomer.phone || '-'}<br>
    Email: ${selectedCustomer.email || '-'}<br>
    Price Table: <b>${selectedCustomer.price_table || '-'}</b>
  `;

  searchProducts();
}

async function getPriceForProduct(productId) {
  if (!selectedCustomer) return 0;

  let customerPriceTableName = selectedCustomer.price_table || '';

  if (!customerPriceTableName) return 0;

  let { data: tableData, error: tableError } = await supabase
    .from('price_tables')
    .select('*')
    .eq('table_name', customerPriceTableName)
    .limit(1);

  if (tableError || !tableData || tableData.length === 0) {
    return 0;
  }

  let tableId = tableData[0].id;

  let { data: priceData, error: priceError } = await supabase
    .from('product_prices')
    .select('*')
    .eq('product_id', productId)
    .eq('price_table_id', tableId)
    .limit(1);

  if (priceError || !priceData || priceData.length === 0) {
    return 0;
  }

  return Number(priceData[0].price || 0);
}

async function searchProducts() {
  let search = document.getElementById('productSearch').value;

  if (!selectedCustomer) {
    document.getElementById('productList').innerHTML = `
      <div style="background:#fff3cd; border:1px solid #ffeeba; padding:15px; border-radius:8px;">
        Select the customer first
      </div>
    `;
    return;
  }

  let query = supabase
    .from('products')
    .select('*')
    .order('name')
    .limit(10);

  if (search) {
    query = query.ilike('name', '%' + search + '%');
  }

  let { data, error } = await query;

  if (error) {
    document.getElementById('productList').innerHTML = error.message;
    return;
  }

  let html = '';

  for (let p of (data || [])) {
    let price = await getPriceForProduct(p.id);

    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        <b>${p.name || ''}</b><br>
        Packer: ${p.packer || '-'}<br>
        Category: ${p.category || '-'}<br>
        Price: <b>$${price.toFixed(2)}</b><br><br>
        <button onclick="addItem(${p.id}, '${(p.name || '').replace(/'/g, "\\'")}', ${price})">ADD</button>
      </div>
    `;
  }

  document.getElementById('productList').innerHTML = html || 'No products found';
}

function addItem(id, name, price) {
  let existing = orderItems.find(x => x.product_id === id);

  if (existing) {
    existing.qty += 1;
  } else {
    orderItems.push({
      product_id: id,
      name: name,
      qty: 1,
      price: Number(price || 0)
    });
  }

  renderItems();
}

function updateQty(index, qty) {
  qty = Number(qty);

  if (qty <= 0 || isNaN(qty)) {
    orderItems.splice(index, 1);
  } else {
    orderItems[index].qty = qty;
  }

  renderItems();
}

function removeItem(index) {
  orderItems.splice(index, 1);
  renderItems();
}

function renderItems() {
  let html = '';
  let grandTotal = 0;

  orderItems.forEach((item, index) => {
    let lineTotal = Number(item.qty) * Number(item.price);
    grandTotal += lineTotal;

    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        <b>${item.name}</b><br>
        Price: $${Number(item.price).toFixed(2)}<br>
        Qty:
        <input
          type="number"
          value="${item.qty}"
          min="1"
          onchange="updateQty(${index}, this.value)"
          style="width:80px; padding:5px; margin-left:8px;"
        >
        <br><br>
        Line Total: <b>$${lineTotal.toFixed(2)}</b><br><br>
        <button onclick="removeItem(${index})">REMOVE</button>
      </div>
    `;
  });

  document.getElementById('orderItems').innerHTML = html || 'No items added';
  document.getElementById('grandTotal').innerText = 'Grand Total: $' + grandTotal.toFixed(2);
}

async function submitOrder() {
  if (!selectedCustomer) {
    alert('Select a customer first');
    return;
  }

  if (orderItems.length === 0) {
    alert('Add at least one product');
    return;
  }

  let user = null;
  try {
    user = JSON.parse(localStorage.getItem('user') || 'null');
  } catch (e) {
    user = null;
  }

  let salesperson = user && user.name ? user.name : null;

  let { data: order, error: orderError } = await supabase
    .from('orders')
    .insert([{
      customer_id: selectedCustomer.id,
      status: 'new',
      salesperson: salesperson
    }])
    .select()
    .single();

  if (orderError) {
    alert(orderError.message);
    return;
  }

  for (let item of orderItems) {
    let total = Number(item.qty) * Number(item.price);

    let { error: itemError } = await supabase
      .from('order_items')
      .insert([{
        order_id: order.id,
        product_id: item.product_id,
        qty_boxes: item.qty,
        price: item.price,
        total: total
      }]);

    if (itemError) {
      alert(itemError.message);
      return;
    }

    await supabase.rpc('allocate_inventory', {
      p_product_id: item.product_id,
      p_qty: item.qty,
      p_order_id: order.id
    });
  }

  alert('Order Created Successfully!');
  window.location.href = 'waiting-picking.html';
}

loadCustomers();
renderItems();
</script>

</body>
</html>
