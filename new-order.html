<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>New Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>NEW ORDER</h2>

<label>Customer</label><br>
<select id="customer"></select>
<br><br>

<label>Product</label><br>
<select id="product"></select>
<br><br>

<label>Qty</label><br>
<input id="qty" type="number">
<br><br>

<label>Price</label><br>
<input id="price" type="number">
<br><br>

<button onclick="addItem()">Add Item</button>
<button onclick="createOrder()">Create Order</button>

<br><br>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let orderItems = [];

loadCustomers();
loadProducts();

async function loadCustomers() {
  let { data } = await supabase.from("customers").select("*");
  let select = document.getElementById("customer");
  select.innerHTML = "";
  (data || []).forEach(c => {
    select.innerHTML += `<option value="${c.id}" data-price="${c.price_table_id || ""}">${c.name}</option>`;
  });
}

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let select = document.getElementById("product");
  select.innerHTML = "";
  (data || []).forEach(p => {
    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

document.getElementById("product").onchange = loadPrice;
document.getElementById("customer").onchange = loadPrice;

async function loadPrice() {
  let productId = document.getElementById("product").value;
  let customerSelect = document.getElementById("customer");

  if (!customerSelect || customerSelect.selectedIndex < 0) return;

  let priceTableId = customerSelect.options[customerSelect.selectedIndex].dataset.price;

  if (!productId || !priceTableId) {
    document.getElementById("price").value = "";
    return;
  }

  let { data } = await supabase
    .from("product_prices")
    .select("price")
    .eq("product_id", productId)
    .eq("price_table_id", priceTableId)
    .single();

  if (data) {
    document.getElementById("price").value = data.price;
  } else {
    document.getElementById("price").value = "";
  }
}

function addItem() {
  let productSelect = document.getElementById("product");
  let productId = productSelect.value;
  let productName = productSelect.selectedOptions[0].text;
  let qty = Number(document.getElementById("qty").value);
  let price = Number(document.getElementById("price").value);

  if (!productId || !qty || !price) {
    alert("Select product, qty and price");
    return;
  }

  orderItems.push({
    product_id: productId,
    name: productName,
    qty: qty,
    price: price
  });

  renderItems();
  document.getElementById("qty").value = "";
}

function renderItems() {
  let html = "";
  orderItems.forEach(i => {
    html += `
      <tr>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>${i.price}</td>
      </tr>
    `;
  });
  document.getElementById("items").innerHTML = html;
}

async function updateAvailable(productId) {
  let { data } = await supabase
    .from("products")
    .select("on_hand, on_order, allocated")
    .eq("id", productId)
    .single();

  let available =
    Number(data?.on_hand || 0) +
    Number(data?.on_order || 0) -
    Number(data?.allocated || 0);

  await supabase
    .from("products")
    .update({ available: available })
    .eq("id", productId);
}

async function addLedger(productId, qty, type, reference) {
  await supabase.from("inventory_ledger").insert({
    product_id: productId,
    qty: qty,
    type: type,
    reference: reference
  });
}

async function createOrder() {
  let customerId = document.getElementById("customer").value;

  if (!customerId) {
    alert("Select customer");
    return;
  }

  if (orderItems.length === 0) {
    alert("Add at least one item");
    return;
  }

  let { data: order, error: orderError } = await supabase
    .from("orders")
    .insert([{ customer_id: customerId, status: "OPEN" }])
    .select()
    .single();

  if (orderError) {
    alert("Error creating order");
    return;
  }

  for (const item of orderItems) {
    await supabase.from("order_items").insert({
      order_id: order.id,
      product_id: item.product_id,
      qty: item.qty,
      price: item.price
    });

    let { data: product } = await supabase
      .from("products")
      .select("allocated")
      .eq("id", item.product_id)
      .single();

    let allocated = Number(product?.allocated || 0) + Number(item.qty);

    await supabase
      .from("products")
      .update({ allocated: allocated })
      .eq("id", item.product_id);

    await updateAvailable(item.product_id);
    await addLedger(item.product_id, -item.qty, "ORDER", "Order " + order.id);
  }

  alert("Order Created");
  location.reload();
}
</script>

</body>
</html>
