<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Load Truck</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>LOAD TRUCK</h2>

<div id="orderInfo">Loading...</div>

<h3>Items</h3>
<div id="items"></div>

<br>
<button onclick="finishLoading()">FINISH LOADING</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");

loadOrder();

async function loadOrder() {

  const { data: order } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("id", orderId)
    .single();

  document.getElementById("orderInfo").innerHTML =
    "Order: " + order.id + "<br>" +
    "Customer: " + order.customer_name;

  const { data: items } = await supabaseClient
    .from("order_items")
    .select("*")
    .eq("order_id", orderId);

  let html = "";

  for (const item of items) {

    const { data: product } = await supabaseClient
      .from("products")
      .select("name_en")
      .eq("id", item.product_id)
      .single();

    html += item.qty_boxes + " - " + product.name_en + "<br>";
  }

  document.getElementById("items").innerHTML = html;
}

async function finishLoading() {
  await supabaseClient
    .from("orders")
    .update({ status: "loaded" })
    .eq("id", orderId);

  alert("Truck Loaded!");
  window.location.href = "ready-to-load.html";
}
</script>

</body>
</html>
