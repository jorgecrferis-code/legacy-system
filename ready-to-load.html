<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ready To Load</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>ORDERS READY TO LOAD</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Order</th>
<th>Customer</th>
<th>Date</th>
<th>Status</th>
<th>Open</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadOrders();

async function loadOrders() {
  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("status", "packed")
    .order("id", { ascending: true });

  let html = "";

  for (const order of orders) {
    html += `
      <tr>
        <td>${order.id}</td>
        <td>${order.customer_name}</td>
        <td>${order.created_at.substring(0,10)}</td>
        <td>${order.status}</td>
        <td>
          <button onclick="openOrder(${order.id})">LOAD</button>
        </td>
      </tr>
    `;
  }

  document.getElementById("orders").innerHTML = html;
}

function openOrder(id) {
  window.location.href = "load-truck.html?order_id=" + id;
}
</script>

</body>
</html>
