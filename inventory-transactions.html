<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory Ledger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>INVENTORY LEDGER</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Date</th>
<th>Product</th>
<th>Qty</th>
<th>From Bin</th>
<th>To Bin</th>
<th>Type</th>
<th>Reference</th>
</tr>
</thead>
<tbody id="ledger"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadLedger();

async function loadLedger() {

  let { data } = await supabase
    .from("inventory_ledger")
    .select(`
      qty,
      type,
      reference,
      created_at,
      products(name),
      bins!from_bin(name),
      bins!to_bin(name)
    `)
    .order("created_at", { ascending: false });

  let html = "";

  for (const item of data) {
    html += `
      <tr>
        <td>${new Date(item.created_at).toLocaleString()}</td>
        <td>${item.products?.name || ""}</td>
        <td>${item.qty}</td>
        <td>${item.bins?.name || ""}</td>
        <td>${item.to_bin?.name || ""}</td>
        <td>${item.type}</td>
        <td>${item.reference || ""}</td>
      </tr>
    `;
  }

  document.getElementById("ledger").innerHTML = html;
}
</script>

</body>
</html>
