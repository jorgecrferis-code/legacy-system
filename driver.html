<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Driver App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>DRIVER APP</h2>

<label>Driver Name</label><br>
<input id="driver" placeholder="Driver Name" style="width:100%; padding:10px;">

<br><br>

<button onclick="loadDeliveries()" style="padding:12px 20px; font-size:16px;">LOAD MY ROUTE</button>

<h2>DELIVERIES</h2>
<div id="deliveries">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadDeliveries(){
  const driver = document.getElementById('driver').value;

  let { data, error } = await supabase
    .from('deliveries')
    .select('*')
    .eq('driver', driver)
    .order('id', { ascending:false });

  if(error){
    document.getElementById('deliveries').innerHTML = error.message;
    return;
  }

  let html = '';

  (data || []).forEach(d => {
    html += `
      <div style="background:white; padding:15px; margin-bottom:10px; border:1px solid #ddd; border-radius:8px;">
        Delivery ID: ${d.id}<br>
        Order: ${d.order_id || '-'}<br>
        Customer: ${d.customer_name || '-'}<br>
        Address: ${d.address || '-'}<br>
        Status: ${d.status || '-'}<br><br>
        <button onclick="deliver(${d.id})">DELIVERED</button>
      </div>
    `;
  });

  document.getElementById('deliveries').innerHTML = html || 'No deliveries found';
}

async function deliver(id){
  let { error } = await supabase
    .from('deliveries')
    .update({ status: 'delivered' })
    .eq('id', id);

  if(error){
    alert(error.message);
    return;
  }

  alert('Delivered');
  loadDeliveries();
}
</script>

</body>
</html>
