<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Put Away</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PUT AWAY</h2>

<select id="product"></select>
<select id="bin"></select>
<input id="qty" type="number" placeholder="Qty">
<button onclick="putAway()">Put Away</button>

<h3>Inventory by Bin</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Bin</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="inventory"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";

const supabase = window.supabase.createClient(
  "https://ougbokufspjduwepqepj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwW9kRQkM3oR1CWoPG_BaiHbBKHOVQ"
);

loadProducts();
loadBins();
loadInventory();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let html = "";
  for (const p of data) {
    html += `<option value="${p.id}">${p.name}</option>`;
  }
  document.getElementById("product").innerHTML = html;
}

async function loadBins() {
  let { data } = await supabase.from("bins").select("*");
  let html = "";
  for (const b of data) {
    html += `<option value="${b.id}">${b.name}</option>`;
  }
  document.getElementById("bin").innerHTML = html;
}

async function putAway() {
  const product_id = document.getElementById("product").value;
  const bin_id = document.getElementById("bin").value;
  const qty = document.getElementById("qty").value;

  await supabase.from("inventory_by_bin").insert([
    { product_id, bin_id, qty }
  ]);

  await supabase.from("put_away").insert([
    { product_id, bin_id, qty }
  ]);

  alert("Put Away Done");
  location.reload();
}

async function loadInventory() {
  let { data } = await supabase
    .from("inventory_by_bin")
    .select(`
      qty,
      products(name),
      bins(name)
    `);

  let html = "";

  for (const i of data) {
    html += `
      <tr>
        <td>${i.products.name}</td>
        <td>${i.bins.name}</td>
        <td>${i.qty}</td>
      </tr>
    `;
  }

  document.getElementById("inventory").innerHTML = html;
}
</script>

</body>
</html>
