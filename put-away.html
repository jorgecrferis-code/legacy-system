<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Put Away</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PUT AWAY</h2>

<label>Product</label><br>
<select id="product"></select>
<br><br>

<label>Bin</label><br>
<select id="bin"></select>
<br><br>

<label>Qty</label><br>
<input id="qty" type="number">
<br><br>

<button onclick="putAway()">Put Away</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadProducts();
loadBins();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let select = document.getElementById("product");
  select.innerHTML = "";
  (data || []).forEach(p => {
    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

async function loadBins() {
  let { data } = await supabase.from("bins").select("*");
  let select = document.getElementById("bin");
  select.innerHTML = "";
  (data || []).forEach(b => {
    select.innerHTML += `<option value="${b.id}">${b.code}</option>`;
  });
}

async function putAway() {
  let productId = document.getElementById("product").value;
  let binId = document.getElementById("bin").value;
  let qty = Number(document.getElementById("qty").value);

  if (!productId || !binId || !qty) {
    alert("Fill all fields");
    return;
  }

  await supabase.from("inventory_bins").insert({
    product_id: productId,
    bin_id: binId,
    qty: qty
  });

  alert("Put Away Done");
}
</script>

</body>
</html>
