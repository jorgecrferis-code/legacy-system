<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Put Away</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PUT AWAY</h2>

<input id="product_id" placeholder="Product ID"><br><br>
<input id="lot" placeholder="Lot"><br><br>
<input id="exp" placeholder="Expiration"><br><br>
<input id="qty" placeholder="Qty"><br><br>
<input id="bin_id" placeholder="Bin ID"><br><br>

<button onclick="putAway()">Put Away</button>

<h2>PUT AWAY HISTORY</h2>
<div id="putaway_list">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function putAway(){
  const product_id = document.getElementById('product_id').value;
  const lot = document.getElementById('lot').value;
  const exp = document.getElementById('exp').value;
  const qty = document.getElementById('qty').value;
  const bin_id = document.getElementById('bin_id').value;

  await supabase.from('put_away').insert([{
    product_id,
    lot,
    expiration_date: exp,
    qty,
    bin_id
  }]);

  alert('Put Away Done');
  loadPutAway();
}

async function loadPutAway(){
  let { data } = await supabase
    .from('put_away')
    .select('*')
    .order('created_at', { ascending:false });

  let html = '';

  data.forEach(p => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        Product: ${p.product_id}<br>
        Qty: ${p.qty}<br>
        Bin: ${p.bin_id}<br>
        Lot: ${p.lot}
      </div>
    `;
  });

  document.getElementById('putaway_list').innerHTML = html;
}

loadPutAway();
</script>

</body>
</html>
