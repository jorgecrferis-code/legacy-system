<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>DELIVERY</h2>

<label>Order Ready</label><br>
<select id="order"></select>
<br><br>

<button onclick="deliverOrder()">Deliver Order</button>

<h3>Order Items</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadOrders();

async function loadOrders() {
  let { data } = await supabase
    .from("orders")
    .select("*")
    .eq("status", "READY");

  let select = document.getElementById("order");
  select.innerHTML = "";

  (data || []).forEach(o => {
    select.innerHTML += `<option value="${o.id}">Order #${o.id}</option>`;
  });

  loadItems();
}

document.getElementById("order").onchange = loadItems;

async function loadItems() {
  let orderId = document.getElementById("order").value;

  if (!orderId) {
    document.getElementById("items").innerHTML = "";
    return;
  }

  let { data } = await supabase
    .from("order_items")
    .select("*, products(name)")
    .eq("order_id", orderId);

  let html = "";

  (data || []).forEach(i => {
    html += `
      <tr>
        <td>${i.products?.name || ""}</td>
        <td>${i.qty}</td>
      </tr>
    `;
  });

  document.getElementById("items").innerHTML = html;
}

async function updateAvailable(productId) {
  let { data } = await supabase
    .from("products")
    .select("on_hand, on_order, allocated")
    .eq("id", productId)
    .single();

  let available =
    Number(data?.on_hand || 0) +
    Number(data?.on_order || 0) -
    Number(data?.allocated || 0);

  await supabase
    .from("products")
    .update({ available: available })
    .eq("id", productId);
}

async function addLedger(productId, qty, type, reference) {
  await supabase.from("inventory_ledger").insert({
    product_id: productId,
    qty: qty,
    type: type,
    reference: reference
  });
}

async function deliverOrder() {
  let orderId = document.getElementById("order").value;

  if (!orderId) {
    alert("Select order");
    return;
  }

  let { data: items } = await supabase
    .from("order_items")
    .select("*")
    .eq("order_id", orderId);

  for (const item of items || []) {

    let { data: product } = await supabase
      .from("products")
      .select("on_hand, allocated")
      .eq("id", item.product_id)
      .single();

    let newOnHand = Number(product?.on_hand || 0) - Number(item.qty);
    let newAllocated = Number(product?.allocated || 0) - Number(item.qty);

    await supabase
      .from("products")
      .update({
        on_hand: newOnHand,
        allocated: newAllocated
      })
      .eq("id", item.product_id);

    await updateAvailable(item.product_id);
    await addLedger(item.product_id, -item.qty, "DELIVERY", "Order " + orderId);
  }

  await supabase
    .from("orders")
    .update({ status: "DELIVERED" })
    .eq("id", orderId);

  alert("Order Delivered and Inventory Updated");
  location.reload();
}
</script>

</body>
</html>
