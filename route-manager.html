<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Route Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>ROUTE MANAGER</h2>

<label>Route Name</label><br>
<input id="route_name">
<br><br>

<label>Truck</label><br>
<input id="truck">
<br><br>

<label>Driver</label><br>
<input id="driver">
<br><br>

<button onclick="createRoute()">Create Route</button>

<hr>

<h3>Assign Orders to Route</h3>

<label>Route</label><br>
<select id="route"></select>
<br><br>

<label>Order READY</label><br>
<select id="order"></select>
<br><br>

<button onclick="assignOrder()">Assign Order</button>

<hr>

<h3>Route Orders</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Route</th>
<th>Truck</th>
<th>Driver</th>
<th>Order</th>
</tr>
</thead>
<tbody id="routes_table"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadRoutes();
loadOrders();
loadTable();

async function createRoute() {
  let name = document.getElementById("route_name").value;
  let truck = document.getElementById("truck").value;
  let driver = document.getElementById("driver").value;

  if (!name || !truck || !driver) {
    alert("Fill all fields");
    return;
  }

  await supabase.from("routes").insert({
    name: name,
    truck: truck,
    driver: driver,
    status: "OPEN"
  });

  alert("Route Created");
  loadRoutes();
}

async function loadRoutes() {
  let { data } = await supabase.from("routes").select("*");

  let select = document.getElementById("route");
  select.innerHTML = "";

  (data || []).forEach(r => {
    select.innerHTML += `<option value="${r.id}">${r.name}</option>`;
  });
}

async function loadOrders() {
  let { data } = await supabase
    .from("orders")
    .select("*")
    .eq("status", "READY");

  let select = document.getElementById("order");
  select.innerHTML = "";

  (data || []).forEach(o => {
    select.innerHTML += `<option value="${o.id}">Order #${o.id}</option>`;
  });
}

async function assignOrder() {
  let routeId = document.getElementById("route").value;
  let orderId = document.getElementById("order").value;

  await supabase.from("route_orders").insert({
    route_id: routeId,
    order_id: orderId
  });

  alert("Order Assigned");
  loadTable();
}

async function loadTable() {
  let { data } = await supabase
    .from("route_orders")
    .select("*, routes(name,truck,driver), orders(id)");

  let html = "";

  (data || []).forEach(r => {
    html += `
      <tr>
        <td>${r.routes.name}</td>
        <td>${r.routes.truck}</td>
        <td>${r.routes.driver}</td>
        <td>Order #${r.orders.id}</td>
      </tr>
    `;
  });

  document.getElementById("routes_table").innerHTML = html;
}
</script>

</body>
</html>
