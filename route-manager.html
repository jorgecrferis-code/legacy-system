<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Route Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>ROUTE MANAGER</h2>

<h3>Create Route</h3>

<label>Route Name:</label>
<input type="text" id="routeName">

<br><br>

<label>Delivery Date:</label>
<input type="date" id="deliveryDate">

<br><br>

<label>Driver:</label>
<input type="text" id="driver">

<br><br>

<label>Truck:</label>
<input type="text" id="truck">

<br><br>

<button onclick="createRoute()">Create Route</button>

<hr>

<h3>Open Routes</h3>
<div id="routes">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function createRoute() {
  let name = document.getElementById('routeName').value;
  let date = document.getElementById('deliveryDate').value;
  let driver = document.getElementById('driver').value;
  let truck = document.getElementById('truck').value;

  await supabase.from('routes').insert([
    {
      route_name: name,
      delivery_date: date,
      driver: driver,
      truck: truck
    }
  ]);

  alert("Route Created");
  loadRoutes();
}

async function loadRoutes() {
  let { data } = await supabase
    .from('routes')
    .select('*')
    .order('delivery_date', { ascending: false });

  let html = "";

  data.forEach(route => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px;">
        <b>${route.route_name}</b><br>
        Date: ${route.delivery_date}<br>
        Driver: ${route.driver}<br>
        Truck: ${route.truck}<br>
      </div>
    `;
  });

  document.getElementById('routes').innerHTML = html;
}

loadRoutes();
</script>

</body>
</html>
