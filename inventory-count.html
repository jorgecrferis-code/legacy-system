<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory Count</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>INVENTORY COUNT</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>On Hand</th>
<th>Count</th>
<th>Adjust</th>
</tr>
</thead>
<tbody id="count"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadProducts();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");

  let html = "";

  (data || []).forEach(p => {
    html += `
      <tr>
        <td>${p.name}</td>
        <td>${p.on_hand || 0}</td>
        <td><input type="number" id="count_${p.id}"></td>
        <td><button onclick="adjust(${p.id})">Adjust</button></td>
      </tr>
    `;
  });

  document.getElementById("count").innerHTML = html;
}

async function updateAvailable(productId) {
  let { data } = await supabase
    .from("products")
    .select("on_hand, on_order, allocated")
    .eq("id", productId)
    .single();

  let available =
    Number(data?.on_hand || 0) +
    Number(data?.on_order || 0) -
    Number(data?.allocated || 0);

  await supabase
    .from("products")
    .update({ available: available })
    .eq("id", productId);
}

async function addLedger(productId, qty, type, reference) {
  await supabase.from("inventory_ledger").insert({
    product_id: productId,
    qty: qty,
    type: type,
    reference: reference
  });
}

async function adjust(productId) {
  let countValue = Number(document.getElementById("count_" + productId).value);

  let { data: product } = await supabase
    .from("products")
    .select("on_hand")
    .eq("id", productId)
    .single();

  let onHand = Number(product?.on_hand || 0);
  let diff = countValue - onHand;

  await supabase
    .from("products")
    .update({ on_hand: countValue })
    .eq("id", productId);

  await updateAvailable(productId);
  await addLedger(productId, diff, "ADJUSTMENT", "Inventory Count");

  alert("Inventory Adjusted");
  loadProducts();
}
</script>

</body>
</html>
