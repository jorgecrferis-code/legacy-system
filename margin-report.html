<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Margin Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>MARGIN REPORT</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Order</th>
<th>Product</th>
<th>Qty</th>
<th>Cost</th>
<th>Price</th>
<th>Profit</th>
</tr>
</thead>
<tbody id="report"></tbody>
</table>

<h3 id="totalProfit"></h3>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJIUzI1NiIsInR5cCI6IkpXVCJ9";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadReport();

async function loadReport() {

  let { data } = await supabase
    .from("order_items")
    .select(`
      qty,
      price,
      orders(id),
      products(name, cost)
    `);

  let html = "";
  let total = 0;

  for (const item of data) {

    let cost = item.products.cost;
    let price = item.price;
    let qty = item.qty;

    let profit = (price - cost) * qty;
    total += profit;

    html += `
      <tr>
        <td>${item.orders.id}</td>
        <td>${item.products.name}</td>
        <td>${qty}</td>
        <td>${cost}</td>
        <td>${price}</td>
        <td>${profit.toFixed(2)}</td>
      </tr>
    `;
  }

  document.getElementById("report").innerHTML = html;
  document.getElementById("totalProfit").innerText = "Total Profit: $" + total.toFixed(2);
}
</script>

</body>
</html>
