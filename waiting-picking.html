<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waiting Picking</title>

</head>

<body style="font-family: Arial">

<h2>WAITING PICKING</h2>
<div id="orders">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadOrders() {
  const { data } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("status", "WAITING");

  let html = "";

  if(data){
    data.forEach(order => {
      html += `
        <div style="margin-bottom:10px;">
          Order #${order.id}
          <button onclick="openPick(${order.id})">OPEN PICK</button>
        </div>
      `;
    });
  }

  document.getElementById("orders").innerHTML = html;
}

async function openPick(orderId) {
  await supabaseClient
    .from("orders")
    .update({ status: "PICKING" })
    .eq("id", orderId);

  window.location.href = "picking.html?order_id=" + orderId;
}

loadOrders();
</script>

</body>
</html>
