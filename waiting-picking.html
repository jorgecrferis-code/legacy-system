<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waiting Picking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:20px;">
<h2>WAITING PICKING</h2>

<div id="orders">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadOrders() {
  document.getElementById("orders").innerHTML = "Loading orders...";

  let { data, error } = await supabase
    .from("orders")
    .select("*")
    .eq("status", "WAITING");

  if(error){
    document.getElementById("orders").innerHTML = "Error: " + error.message;
    return;
  }

  if(!data || data.length === 0){
    document.getElementById("orders").innerHTML = "No waiting orders";
    return;
  }

  let html = "";

  data.forEach(order => {
    html += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc;">
        Order #${order.id} - ${order.customer_name || ""}
        <button onclick="openPick(${order.id})">OPEN PICK</button>
      </div>
    `;
  });

  document.getElementById("orders").innerHTML = html;
}

function openPick(id){
  window.location.href = "picking.html?order_id=" + id;
}

loadOrders();
</script>

</body>
</html>
