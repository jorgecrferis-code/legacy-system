<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waiting Picking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>WAITING PICKING</h2>
<div id="orders">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "SUA_ANON_AQUI";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadOrders() {
  let { data } = await supabase
    .from('orders')
    .select('*, customers(customer_name)')
    .eq('status', 'new');

  let html = "";

  data.forEach(order => {
    html += `
      <div style="background:white; padding:15px; margin-bottom:10px;">
        Order #${order.id}<br>
        ${order.customers.customer_name}<br><br>
        <button onclick="startPicking(${order.id})">START PICKING</button>
      </div>
    `;
  });

  document.getElementById('orders').innerHTML = html;
}

async function startPicking(orderId) {
  await supabase.from('orders').update({ status: 'picking' }).eq('id', orderId);
  window.location.href = "picking.html?order_id=" + orderId;
}

loadOrders();
</script>

</body>
</html>
