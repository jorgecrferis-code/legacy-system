<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invoices</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>INVOICES</h2>

<div id="invoices">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadInvoices() {
  let { data, error } = await supabase
    .from('accounts_receivable')
    .select('*')
    .order('invoice_date', { ascending: false });

  if(error){
    document.getElementById('invoices').innerHTML = error.message;
    return;
  }

  let html = '';

  data.forEach(inv => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        <b>Invoice #${inv.invoice_id}</b><br>
        Customer: ${inv.customer_name}<br>
        Invoice Date: ${inv.invoice_date}<br>
        Due Date: ${inv.due_date}<br>
        Total: $${Number(inv.total).toFixed(2)}<br>
        Paid: $${Number(inv.paid).toFixed(2)}<br>
        Balance: <b>$${Number(inv.balance).toFixed(2)}</b>
      </div>
    `;
  });

  document.getElementById('invoices').innerHTML = html;
}

loadInvoices();
</script>

</body>
</html>
