loadInvoices();

async function loadInvoices() {
  let { data, error } = await supabase
    .from("invoices")
    .select("*")
    .order("id", { ascending: true });

  let html = "";

  for (const inv of data) {
    html += `
      <tr>
        <td>${inv.id}</td>
        <td>${inv.order_id}</td>
        <td>${inv.status}</td>
        <td>${inv.created_at.substring(0,10)}</td>
      </tr>
    `;
  }

  document.getElementById("invoices").innerHTML = html;
}
