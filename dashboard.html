<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h1>DASHBOARD</h1>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

<div style="background:white; padding:20px; width:200px;">
<h3>Sales Today</h3>
<h2 id="salesToday">$0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Orders Today</h3>
<h2 id="ordersToday">0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Inventory Value</h3>
<h2 id="inventoryValue">$0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Low Stock</h3>
<h2 id="lowStock">0</h2>
</div>

</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadDashboard();

async function loadDashboard() {

  // SALES TODAY
  let today = new Date().toISOString().slice(0,10);

  let { data: invoices } = await supabase
    .from("invoices")
    .select("total, created_at");

  let salesToday = 0;

  for (const inv of invoices) {
    if (inv.created_at.startsWith(today)) {
      salesToday += inv.total;
    }
  }

  document.getElementById("salesToday").innerText = "$" + salesToday.toFixed(2);

  // ORDERS TODAY
  let { data: orders } = await supabase
    .from("orders")
    .select("created_at");

  let ordersToday = 0;

  for (const o of orders) {
    if (o.created_at.startsWith(today)) {
      ordersToday++;
    }
  }

  document.getElementById("ordersToday").innerText = ordersToday;

  // INVENTORY VALUE
  let { data: products } = await supabase
    .from("products")
    .select("stock, cost");

  let inventoryValue = 0;

  for (const p of products) {
    inventoryValue += (p.stock || 0) * (p.cost || 0);
  }

  document.getElementById("inventoryValue").innerText = "$" + inventoryValue.toFixed(2);

  // LOW STOCK
  let { data: lowProducts } = await supabase
    .from("products")
    .select("stock, min_stock");

  let lowStock = 0;

  for (const p of lowProducts) {
    if ((p.stock || 0) <= (p.min_stock || 0)) {
      lowStock++;
    }
  }

  document.getElementById("lowStock").innerText = lowStock;
}
</script>

</body>
</html>
