<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>DASHBOARD</h2>

<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:20px;">

<div style="background:white; padding:20px;">
<h3>Sales</h3>
<h1 id="sales">$0</h1>
</div>

<div style="background:white; padding:20px;">
<h3>Profit</h3>
<h1 id="profit">$0</h1>
</div>

<div style="background:white; padding:20px;">
<h3>Orders</h3>
<h1 id="orders">0</h1>
</div>

<div style="background:white; padding:20px;">
<h3>Invoices Open</h3>
<h1 id="invoices">0</h1>
</div>

<div style="background:white; padding:20px;">
<h3>Payments</h3>
<h1 id="payments">$0</h1>
</div>

<div style="background:white; padding:20px;">
<h3>Low Stock</h3>
<h1 id="lowstock">0</h1>
</div>

</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadDashboard();

async function loadDashboard() {

  // SALES
  let { data: salesItems } = await supabase
    .from("order_items")
    .select("qty, price");

  let sales = 0;
  for (const item of salesItems) {
    sales += item.qty * item.price;
  }

  // PROFIT
  let { data: profitItems } = await supabase
    .from("order_items")
    .select(`
      qty,
      price,
      products(cost)
    `);

  let profit = 0;
  for (const item of profitItems) {
    profit += (item.price - item.products.cost) * item.qty;
  }

  // ORDERS
  let { count: ordersCount } = await supabase
    .from("orders")
    .select("*", { count: "exact", head: true });

  // INVOICES OPEN
  let { count: invoicesCount } = await supabase
    .from("invoices")
    .select("*", { count: "exact", head: true })
    .eq("status", "open");

  // PAYMENTS
  let { data: paymentsData } = await supabase
    .from("payments")
    .select("amount");

  let payments = 0;
  for (const p of paymentsData) {
    payments += Number(p.amount);
  }

  // LOW STOCK
  let { count: lowStock } = await supabase
    .from("products")
    .select("*", { count: "exact", head: true })
    .lt("stock", 10);

  document.getElementById("sales").innerText = "$" + sales.toFixed(2);
  document.getElementById("profit").innerText = "$" + profit.toFixed(2);
  document.getElementById("orders").innerText = ordersCount;
  document.getElementById("invoices").innerText = invoicesCount;
  document.getElementById("payments").innerText = "$" + payments.toFixed(2);
  document.getElementById("lowstock").innerText = lowStock;
}
</script>

</body>
</html>
