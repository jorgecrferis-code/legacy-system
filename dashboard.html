<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h1>DASHBOARD</h1>

<div id="dashboard">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadDashboard(){
  let { data } = await supabase
    .from('dashboard_summary')
    .select('*')
    .single();

  let html = `
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">

      <div style="background:white; padding:20px;">
        <h3>Sales This Month</h3>
        <h2>$${Number(data.sales_month).toFixed(2)}</h2>
      </div>

      <div style="background:white; padding:20px;">
        <h3>Open Orders</h3>
        <h2>${data.open_orders}</h2>
      </div>

      <div style="background:white; padding:20px;">
        <h3>Inventory Value</h3>
        <h2>$${Number(data.inventory_value).toFixed(2)}</h2>
      </div>

      <div style="background:white; padding:20px;">
        <h3>Accounts Receivable</h3>
        <h2>$${Number(data.accounts_receivable).toFixed(2)}</h2>
      </div>

      <div style="background:white; padding:20px;">
        <h3>Low Stock Items</h3>
        <h2>${data.low_stock_items}</h2>
      </div>

    </div>
  `;

  document.getElementById('dashboard').innerHTML = html;
}

loadDashboard();
</script>

</body>
</html>
