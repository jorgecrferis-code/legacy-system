<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h1>DASHBOARD</h1>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

<div style="background:white; padding:20px; width:200px;">
<h3>Sales Today</h3>
<h2 id="salesToday">$0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Orders Today</h3>
<h2 id="ordersToday">0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Inventory Value</h3>
<h2 id="inventoryValue">$0</h2>
</div>

<div style="background:white; padding:20px; width:200px;">
<h3>Low Stock</h3>
<h2 id="lowStock">0</h2>
</div>

</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadDashboard();

async function loadDashboard() {

  // SALES TODAY
  let { data: sales } = await supabase
    .from("order_items")
    .select("qty, price");

  let totalSales = 0;
  sales.forEach(s => {
    totalSales += s.qty * s.price;
  });

  document.getElementById("salesToday").innerText = "$" + totalSales.toFixed(2);

  // ORDERS TODAY
  let { count } = await supabase
    .from("orders")
    .select("*", { count: "exact", head: true });

  document.getElementById("ordersToday").innerText = count;

  // INVENTORY VALUE
  let { data: inventory } = await supabase
    .from("inventory")
    .select("qty, products(cost)");

  let totalInventory = 0;
  inventory.forEach(i => {
    totalInventory += i.qty * i.products.cost;
  });

  document.getElementById("inventoryValue").innerText = "$" + totalInventory.toFixed(2);

  // LOW STOCK
  let { count: low } = await supabase
    .from("products")
    .select("*", { count: "exact", head: true })
    .lt("stock", 10);

  document.getElementById("lowStock").innerText = low;
}
</script>

</body>
</html>
