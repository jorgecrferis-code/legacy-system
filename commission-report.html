<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commission Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>COMMISSION REPORT</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Profit</th>
<th>Commission (10%)</th>
</tr>
</thead>
<tbody id="commissions"></tbody>
</table>

<h3 id="totalCommission"></h3>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadCommission();

async function loadCommission() {

  let { data } = await supabase
    .from("order_items")
    .select(`
      qty,
      price,
      products(name, cost)
    `);

  let html = "";
  let totalCommission = 0;

  for (const item of data) {
    let profit = (item.price - item.products.cost) * item.qty;
    let commission = profit * 0.10;
    totalCommission += commission;

    html += `
      <tr>
        <td>${item.products.name}</td>
        <td>${item.qty}</td>
        <td>${profit.toFixed(2)}</td>
        <td>${commission.toFixed(2)}</td>
      </tr>
    `;
  }

  document.getElementById("commissions").innerHTML = html;
  document.getElementById("totalCommission").innerText = "Total Commission: $" + totalCommission.toFixed(2);
}
</script>

</body>
</html>
