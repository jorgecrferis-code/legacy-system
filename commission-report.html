<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commission Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>COMMISSION REPORT</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Order</th>
<th>Revenue</th>
<th>Cost</th>
<th>Profit</th>
<th>Margin %</th>
<th>Commission %</th>
<th>Commission $</th>
</tr>
</thead>
<tbody id="report"></tbody>
</table>

<h3 id="totalCommission"></h3>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadReport();

async function loadReport() {

  let { data } = await supabase
    .from("order_items")
    .select(`
      qty,
      price,
      orders(id),
      products(cost)
    `);

  let orders = {};
  let totalCommission = 0;

  for (const item of data) {

    let orderId = item.orders.id;
    let revenue = item.price * item.qty;
    let cost = item.products.cost * item.qty;

    if (!orders[orderId]) {
      orders[orderId] = { revenue: 0, cost: 0 };
    }

    orders[orderId].revenue += revenue;
    orders[orderId].cost += cost;
  }

  let html = "";

  for (const orderId in orders) {

    let revenue = orders[orderId].revenue;
    let cost = orders[orderId].cost;
    let profit = revenue - cost;
    let margin = (profit / revenue) * 100;

    let commissionRate = 0;

    if (margin <= 5) commissionRate = 0.01;
    else if (margin <= 8) commissionRate = 0.05;
    else if (margin <= 13) commissionRate = 0.10;
    else commissionRate = 0.15;

    let commission = profit * commissionRate;
    totalCommission += commission;

    html += `
      <tr>
        <td>${orderId}</td>
        <td>${revenue.toFixed(2)}</td>
        <td>${cost.toFixed(2)}</td>
        <td>${profit.toFixed(2)}</td>
        <td>${margin.toFixed(2)}%</td>
        <td>${(commissionRate*100)}%</td>
        <td>${commission.toFixed(2)}</td>
      </tr>
    `;
  }

  document.getElementById("report").innerHTML = html;
  document.getElementById("totalCommission").innerText =
    "Total Commission: $" + totalCommission.toFixed(2);
}
</script>

</body>
</html>
