<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventory by Bin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>INVENTORY BY BIN</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Bin</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="inventory"></tbody>
</table>

<script>
const supabase = window.supabase.createClient(
  "https://ougbokufspjduwepqepj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ"
);

loadInventory();

async function loadInventory() {
  let { data } = await supabase
    .from("inventory_by_bin")
    .select(`
      qty,
      products(name),
      bins(name)
    `);

  let html = "";

  for (const i of data) {
    html += `
      <tr>
        <td>${i.products.name}</td>
        <td>${i.bins.name}</td>
        <td>${i.qty}</td>
      </tr>
    `;
  }

  document.getElementById("inventory").innerHTML = html;
}
</script>

</body>
</html>
