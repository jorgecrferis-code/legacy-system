<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bins</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>BINS</h2>

<input id="binName" placeholder="Bin Name">
<button onclick="createBin()">Create Bin</button>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
</tr>
</thead>
<tbody id="bins"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadBins();

async function createBin() {
  const name = document.getElementById("binName").value;

  await supabase.from("bins").insert([
    { name: name }
  ]);

  location.reload();
}

async function loadBins() {
  let { data } = await supabase
    .from("bins")
    .select("*");

  let html = "";

  for (const bin of data) {
    html += `
      <tr>
        <td>${bin.id}</td>
        <td>${bin.name}</td>
      </tr>
    `;
  }

  document.getElementById("bins").innerHTML = html;
}
</script>

</body>
</html>
