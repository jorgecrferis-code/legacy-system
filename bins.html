<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bins</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>BIN LOCATIONS</h2>

<input id="bin_code" placeholder="Bin Code">
<button onclick="addBin()">Add Bin</button>

<br><br>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Bin</th>
</tr>
</thead>
<tbody id="bins"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadBins();

async function loadBins() {
  let { data } = await supabase.from("bins").select("*");

  let html = "";

  (data || []).forEach(b => {
    html += `
      <tr>
        <td>${b.code}</td>
      </tr>
    `;
  });

  document.getElementById("bins").innerHTML = html;
}

async function addBin() {
  let code = document.getElementById("bin_code").value;

  if (!code) {
    alert("Enter bin code");
    return;
  }

  await supabase.from("bins").insert({ code: code });

  document.getElementById("bin_code").value = "";
  loadBins();
}
</script>

</body>
</html>
