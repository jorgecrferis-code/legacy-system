<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Legacy System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<script>
let user = localStorage.getItem("user");
let role = localStorage.getItem("role");

if(!user){
  window.location.href = "login.html";
}
</script>

<h1>LEGACY SYSTEM</h1>
<h3 id="welcome"></h3>

<script>
document.getElementById('welcome').innerText =
  "Welcome " + localStorage.getItem("user") +
  " (" + localStorage.getItem("role") + ")";
</script>

<h3>SALES</h3>
<div id="sales_menu">
  <button onclick="go('seller.html')">Seller App</button>
  <button onclick="go('product-search.html')">Product Search</button>
  <button onclick="go('new-order.html')">New Order</button>
</div>

<h3>WAREHOUSE</h3>
<div id="warehouse_menu">
  <button onclick="go('receiving.html')">Receiving</button>
  <button onclick="go('put-away.html')">Put Away</button>
  <button onclick="go('picking.html')">Picking</button>
  <button onclick="go('packing.html')">Packing</button>
  <button onclick="go('staging.html')">Staging</button>
</div>

<h3>LOGISTICS</h3>
<div id="logistics_menu">
  <button onclick="go('route-manager.html')">Routes</button>
  <button onclick="go('truck-loading.html')">Load Truck</button>
  <button onclick="go('driver.html')">Driver</button>
</div>

<h3>FINANCE</h3>
<div id="finance_menu">
  <button onclick="go('invoices.html')">Invoices</button>
  <button onclick="go('payments.html')">Payments</button>
  <button onclick="go('aging.html')">Aging</button>
</div>

<script>
function go(page){
  window.location.href = page;
}

let role = localStorage.getItem("role");

if(role !== 'admin' && role !== 'sales'){
  document.getElementById('sales_menu').style.display = 'none';
}

if(role !== 'admin' && role !== 'warehouse'){
  document.getElementById('warehouse_menu').style.display = 'none';
}

if(role !== 'admin' && role !== 'driver'){
  document.getElementById('logistics_menu').style.display = 'none';
}

if(role !== 'admin' && role !== 'finance'){
  document.getElementById('finance_menu').style.display = 'none';
}
</script>

</body>
</html>
