<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Price Tables</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PRICE TABLES</h2>

<h3>Create Price Table</h3>
<input type="text" id="tableName" placeholder="Table Name">
<button onclick="createTable()">Create</button>

<hr>

<h3>Add Product Price</h3>

<select id="priceTable"></select>
<br><br>

<input type="text" id="productSearch" placeholder="Search product..." onkeyup="searchProducts()" style="width:100%; padding:10px;">
<div id="productList"></div>

<br>
<label>Price:</label>
<input type="number" id="price">

<br><br>
<button onclick="savePrice()">Save Price</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let selectedProduct = null;

async function loadTables(){
  let { data } = await supabase.from('price_tables').select('*');
  let select = document.getElementById('priceTable');
  select.innerHTML = "";

  data.forEach(t => {
    select.innerHTML += `<option value="${t.id}">${t.table_name}</option>`;
  });
}

async function createTable(){
  let name = document.getElementById('tableName').value;
  await supabase.from('price_tables').insert([{ table_name: name }]);
  alert("Price Table Created");
  loadTables();
}

async function searchProducts(){
  let search = document.getElementById('productSearch').value;

  let { data } = await supabase
    .from('products')
    .select('*')
    .ilike('name', '%' + search + '%')
    .limit(10);

  let html = "";

  data.forEach(p => {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        ${p.name}
        <button onclick="selectProduct(${p.id})">Select</button>
      </div>
    `;
  });

  document.getElementById('productList').innerHTML = html;
}

function selectProduct(id){
  selectedProduct = id;
  alert("Product Selected");
}

async function savePrice(){
  let tableId = document.getElementById('priceTable').value;
  let price = document.getElementById('price').value;

  await supabase.from('product_prices').insert([
    {
      product_id: selectedProduct,
      price_table_id: tableId,
      price: price
    }
  ]);

  alert("Price Saved");
}

loadTables();
</script>

</body>
</html>
