<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Prices</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PRODUCT PRICE TABLE</h2>

<select id="priceTable"></select>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Save</th>
</tr>
</thead>
<tbody id="prices"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadTables();

async function loadTables() {
  let { data } = await supabase.from("price_tables").select("*");

  let select = document.getElementById("priceTable");
  select.innerHTML = "";

  data.forEach(t => {
    select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
  });

  loadPrices();
}

document.getElementById("priceTable").onchange = loadPrices;

async function loadPrices() {

  let tableId = document.getElementById("priceTable").value;

  let { data: products } = await supabase.from("products").select("*");

  let html = "";

  for (const p of products) {

    let { data: price } = await supabase
      .from("product_prices")
      .select("*")
      .eq("product_id", p.id)
      .eq("price_table_id", tableId)
      .single();

    let value = price ? price.price : "";

    html += `
      <tr>
        <td>${p.name}</td>
        <td><input id="price_${p.id}" value="${value}"></td>
        <td><button onclick="savePrice(${p.id})">Save</button></td>
      </tr>
    `;
  }

  document.getElementById("prices").innerHTML = html;
}

async function savePrice(productId) {
  let tableId = document.getElementById("priceTable").value;
  let price = document.getElementById("price_" + productId).value;

  await supabase.from("product_prices").upsert({
    product_id: productId,
    price_table_id: tableId,
    price: price
  });

  alert("Saved");
}
</script>

</body>
</html>
