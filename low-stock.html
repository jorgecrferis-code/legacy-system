<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Low Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>LOW STOCK ALERT</h2>

<div id="lowstock">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadLowStock(){
  let { data, error } = await supabase
    .from('low_stock')
    .select('*')
    .order('available');

  if(error){
    document.getElementById('lowstock').innerHTML = error.message;
    return;
  }

  let html = '';

  data.forEach(item => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        <b>${item.name}</b><br>
        Available: <b>${item.available}</b><br>
        Min Stock: ${item.min_stock}<br>
        Suggested Order: <b>${item.reorder_qty}</b>
      </div>
    `;
  });

  document.getElementById('lowstock').innerHTML = html;
}

loadLowStock();
</script>

</body>
</html>
