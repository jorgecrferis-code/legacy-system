<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Picking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PICKING</h2>

<div id="items">Loading...</div>

<br>
<button onclick="finish()" style="padding:15px 25px; font-size:18px;">FINISH PICKING</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/script.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const order_id = params.get("order_id");

async function loadItems() {
  const items = await getPickingItems(order_id);

  let html = "";

  items.forEach(i => {
    html += `
      <div style="background:white;padding:15px;margin:10px;border-radius:8px;">
        ${i.product_name} - ${i.qty}
        <br><br>
        <button onclick="pick(${i.id})">PICK</button>
      </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
}

async function pick(id) {
  await markItemPicked(id);
  loadItems();
}

async function finish() {
  await finishPicking(order_id);
  window.location.href = "/packing.html?order_id=" + order_id;
}

loadItems();
</script>

</body>
</html>
