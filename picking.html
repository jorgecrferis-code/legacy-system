<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Picking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PICKING</h2>

<div id="items">Loading...</div>

<br>
<button onclick="finishPicking()">FINISH PICKING</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const urlParams = new URLSearchParams(window.location.search);
const orderId = urlParams.get('order_id');

async function loadItems() {
  let { data } = await supabase
    .from('order_items')
    .select('*, products(name)')
    .eq('order_id', orderId);

  let html = "";

  data.forEach(item => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px;">
        ${item.products.name}
        <br>
        Qty Boxes: ${item.qty_boxes}
      </div>
    `;
  });

  document.getElementById('items').innerHTML = html;
}

async function finishPicking() {

  let { data: items } = await supabase
    .from('order_items')
    .select('*')
    .eq('order_id', orderId);

  for (let item of items) {

    await supabase.rpc('pick_inventory', {
      p_product_id: item.product_id,
      p_qty: item.qty_boxes,
      p_order_id: orderId
    });

  }

  await supabase
    .from('orders')
    .update({ status: 'packing' })
    .eq('id', orderId);

  alert("Picking Finished");
  window.location.href = "waiting-picking.html";
}

loadItems();
</script>

</body>
</html>
