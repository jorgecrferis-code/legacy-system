<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Picking</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:20px;">
<h2>PICKING</h2>

<div id="items">Loading items...</div>

<br>
<button onclick="finishPicking()">FINISH PICKING</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const urlParams = new URLSearchParams(window.location.search);
const order_id = urlParams.get("order_id");

async function loadItems() {
  const { data, error } = await db
    .from("order_items")
    .select("*")
    .eq("order_id", order_id);

  if(error){
    document.getElementById("items").innerHTML = error.message;
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc;">
        <input type="checkbox"
          ${item.picked ? "checked" : ""}
          onchange="togglePicked(${item.id}, this.checked)">
        ${item.product} - Qty: ${item.qty}
      </div>
    `;
  });

  document.getElementById("items").innerHTML = html;
}

async function togglePicked(item_id, checked){
  await db
    .from("order_items")
    .update({ picked: checked })
    .eq("id", item_id);
}

async function finishPicking(){
  const { data } = await db
    .from("order_items")
    .select("*")
    .eq("order_id", order_id)
    .eq("picked", false);

  if(data.length > 0){
    alert("Ainda existem itens não pickados!");
    return;
  }

  await db
    .from("orders")
    .update({ status: "PACKING" })
    .eq("id", order_id);

  window.location.href = "waiting-picking.html";
}

loadItems();
</script>

</body>
</html>
