<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purchase Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PURCHASE ORDERS</h2>

<select id="vendor"></select>
<select id="product"></select>
<input id="qty" type="number" placeholder="Qty">
<input id="cost" type="number" placeholder="Cost">
<button onclick="addItem()">Add Item</button>
<button onclick="createPO()">Create Purchase Order</button>

<h3>Items</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
<th>Cost</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let items = [];

loadVendors();
loadProducts();

async function loadVendors() {
  let { data } = await supabase.from("vendors").select("*");
  let html = "";
  for (const v of data) {
    html += `<option value="${v.id}">${v.name}</option>`;
  }
  document.getElementById("vendor").innerHTML = html;
}

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let html = "";
  for (const p of data) {
    html += `<option value="${p.id}">${p.name}</option>`;
  }
  document.getElementById("product").innerHTML = html;
}

function addItem() {
  const product = document.getElementById("product");
  const product_id = product.value;
  const product_name = product.options[product.selectedIndex].text;
  const qty = document.getElementById("qty").value;
  const cost = document.getElementById("cost").value;

  items.push({ product_id, product_name, qty, cost });

  renderItems();
}

function renderItems() {
  let html = "";
  for (const i of items) {
    html += `
      <tr>
        <td>${i.product_name}</td>
        <td>${i.qty}</td>
        <td>${i.cost}</td>
      </tr>
    `;
  }
  document.getElementById("items").innerHTML = html;
}

async function createPO() {
  const vendor_id = document.getElementById("vendor").value;

  let total = 0;
  for (const i of items) {
    total += i.qty * i.cost;
  }

  let { data } = await supabase
    .from("purchase_orders")
    .insert([
      {
        vendor_id,
        order_date: new Date(),
        status: "OPEN",
        total
      }
    ])
    .select();

  const po_id = data[0].id;

  for (const i of items) {
    await supabase.from("purchase_order_items").insert([
      {
        purchase_order_id: po_id,
        product_id: i.product_id,
        qty: i.qty,
        cost: i.cost
      }
    ]);
  }

  alert("Purchase Order Created");
  location.reload();
}
</script>

</body>
</html>
