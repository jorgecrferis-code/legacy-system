<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purchase Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PURCHASE ORDER</h2>

<label>Vendor</label><br>
<input id="vendor">
<br><br>

<label>Product</label><br>
<select id="product"></select>
<br><br>

<label>Qty</label><br>
<input id="qty" type="number">
<br><br>

<button onclick="addItem()">Add Item</button>
<button onclick="createPO()">Create PO</button>

<br><br>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let poItems = [];

loadProducts();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let select = document.getElementById("product");
  select.innerHTML = "";
  (data || []).forEach(p => {
    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

function addItem() {
  let productSelect = document.getElementById("product");
  let productId = productSelect.value;
  let productName = productSelect.selectedOptions[0].text;
  let qty = Number(document.getElementById("qty").value);

  if (!productId || !qty) {
    alert("Select product and qty");
    return;
  }

  poItems.push({
    product_id: productId,
    name: productName,
    qty: qty
  });

  renderItems();
  document.getElementById("qty").value = "";
}

function renderItems() {
  let html = "";
  poItems.forEach(i => {
    html += `
      <tr>
        <td>${i.name}</td>
        <td>${i.qty}</td>
      </tr>
    `;
  });
  document.getElementById("items").innerHTML = html;
}

async function updateAvailable(productId) {
  let { data } = await supabase
    .from("products")
    .select("on_hand, on_order, allocated")
    .eq("id", productId)
    .single();

  let available =
    Number(data?.on_hand || 0) +
    Number(data?.on_order || 0) -
    Number(data?.allocated || 0);

  await supabase
    .from("products")
    .update({ available: available })
    .eq("id", productId);
}

async function addLedger(productId, qty, type, reference) {
  await supabase.from("inventory_ledger").insert({
    product_id: productId,
    qty: qty,
    type: type,
    reference: reference
  });
}

async function createPO() {
  let vendor = document.getElementById("vendor").value;

  if (!vendor) {
    alert("Enter vendor");
    return;
  }

  if (poItems.length === 0) {
    alert("Add items");
    return;
  }

  let { data: po } = await supabase
    .from("purchase_orders")
    .insert([{ vendor: vendor, status: "OPEN" }])
    .select()
    .single();

  for (const item of poItems) {
    await supabase.from("purchase_items").insert({
      po_id: po.id,
      product_id: item.product_id,
      qty: item.qty
    });

    let { data: product } = await supabase
      .from("products")
      .select("on_order")
      .eq("id", item.product_id)
      .single();

    let newOnOrder = Number(product?.on_order || 0) + Number(item.qty);

    await supabase
      .from("products")
      .update({ on_order: newOnOrder })
      .eq("id", item.product_id);

    await updateAvailable(item.product_id);
    await addLedger(item.product_id, item.qty, "PURCHASE", "PO " + po.id);
  }

  alert("Purchase Order Created");
  location.reload();
}
</script>

</body>
</html>
