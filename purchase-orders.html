<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Purchase Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PURCHASE ORDERS</h2>

<input id="vendor" placeholder="Vendor">
<button onclick="createPO()">Create PO</button>

<h3>Open Purchase Orders</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>PO</th>
<th>Vendor</th>
<th>Status</th>
<th>Open</th>
</tr>
</thead>
<tbody id="poList"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadPO();

async function createPO() {
  const vendor = document.getElementById("vendor").value;

  await supabase.from("purchase_orders").insert([
    { vendor: vendor, status: "open" }
  ]);

  location.reload();
}

async function loadPO() {
  let { data } = await supabase
    .from("purchase_orders")
    .select("*");

  let html = "";

  for (const po of data) {
    html += `
      <tr>
        <td>${po.id}</td>
        <td>${po.vendor}</td>
        <td>${po.status}</td>
        <td>
          <a href="purchase-order.html?po_id=${po.id}">OPEN</a>
        </td>
      </tr>
    `;
  }

  document.getElementById("poList").innerHTML = html;
}
</script>

</body>
</html>
