<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>RECEIVING</h2>

<select id="po"></select>
<select id="product"></select>
<input id="qty" type="number" placeholder="Qty Received">
<button onclick="receive()">Receive</button>

<h3>Receiving History</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>PO</th>
<th>Product</th>
<th>Qty</th>
<th>Date</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadPOs();
loadProducts();
loadHistory();

async function loadPOs() {
  let { data } = await supabase.from("purchase_orders").select("*");
  let html = "";
  for (const po of data) {
    html += `<option value="${po.id}">PO #${po.id}</option>`;
  }
  document.getElementById("po").innerHTML = html;
}

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let html = "";
  for (const p of data) {
    html += `<option value="${p.id}">${p.name}</option>`;
  }
  document.getElementById("product").innerHTML = html;
}

async function receive() {
  const purchase_order_id = document.getElementById("po").value;
  const product_id = document.getElementById("product").value;
  const qty = document.getElementById("qty").value;

  await supabase.from("receiving").insert([
    { purchase_order_id, product_id, qty }
  ]);

  // Atualizar estoque
  let { data } = await supabase
    .from("products")
    .select("stock")
    .eq("id", product_id)
    .single();

  let newStock = (data.stock || 0) + Number(qty);

  await supabase
    .from("products")
    .update({ stock: newStock })
    .eq("id", product_id);

  alert("Received and Stock Updated");
  location.reload();
}

async function loadHistory() {
  let { data } = await supabase
    .from("receiving")
    .select(`
      qty,
      received_date,
      purchase_orders(id),
      products(name)
    `);

  let html = "";

  for (const r of data) {
    html += `
      <tr>
        <td>${r.purchase_orders.id}</td>
        <td>${r.products.name}</td>
        <td>${r.qty}</td>
        <td>${new Date(r.received_date).toLocaleDateString()}</td>
      </tr>
    `;
  }

  document.getElementById("history").innerHTML = html;
}
</script>

</body>
</html>
