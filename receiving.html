<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>RECEIVING</h2>

<label>Product</label><br>
<select id="product"></select>
<br><br>

<label>Qty Received</label><br>
<input id="qty" type="number">
<br><br>

<button onclick="receiveProduct()">Receive</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadProducts();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let select = document.getElementById("product");
  select.innerHTML = "";
  data.forEach(p => {
    select.innerHTML += `<option value="${p.id}">${p.name}</option>`;
  });
}

async function updateAvailable(productId) {
  let { data } = await supabase
    .from("products")
    .select("on_hand, on_order, allocated")
    .eq("id", productId)
    .single();

  let available = (data.on_hand || 0) + (data.on_order || 0) - (data.allocated || 0);

  await supabase
    .from("products")
    .update({ available: available })
    .eq("id", productId);
}

async function receiveProduct() {
  let productId = document.getElementById("product").value;
  let qty = Number(document.getElementById("qty").value);

  if (!productId || !qty) {
    alert("Select product and qty");
    return;
  }

  let { data: product } = await supabase
    .from("products")
    .select("on_hand, on_order")
    .eq("id", productId)
    .single();

  let newOnHand = (product.on_hand || 0) + qty;
  let newOnOrder = (product.on_order || 0) - qty;

  await supabase
    .from("products")
    .update({
      on_hand: newOnHand,
      on_order: newOnOrder
    })
    .eq("id", productId);

  await updateAvailable(productId);

  alert("Received and Inventory Updated");
}
</script>

</body>
</html>
