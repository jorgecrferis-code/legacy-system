<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Receiving</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>RECEIVING</h2>

<h3>Open Purchase Orders</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>PO</th>
<th>Vendor</th>
<th>Status</th>
<th>Receive</th>
</tr>
</thead>
<tbody id="poList"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadPO();

async function loadPO() {
  let { data } = await supabase
    .from("purchase_orders")
    .select("*")
    .eq("status", "open");

  let html = "";

  for (const po of data) {
    html += `
      <tr>
        <td>${po.id}</td>
        <td>${po.vendor}</td>
        <td>${po.status}</td>
        <td>
          <button onclick="receivePO(${po.id})">RECEIVE</button>
        </td>
      </tr>
    `;
  }

  document.getElementById("poList").innerHTML = html;
}

async function receivePO(poId) {

  // pegar itens do PO
  let { data: items } = await supabase
    .from("purchase_order_items")
    .select("*")
    .eq("po_id", poId);

  for (const item of items) {

    // aumentar estoque
    let { data: product } = await supabase
      .from("products")
      .select("stock")
      .eq("id", item.product_id)
      .single();

    let newStock = Number(product.stock) + Number(item.qty);

    await supabase
      .from("products")
      .update({ stock: newStock })
      .eq("id", item.product_id);

    // criar transação
    await supabase
      .from("inventory_transactions")
      .insert([
        {
          product_id: item.product_id,
          qty: item.qty,
          type: "RECEIVING",
          reference: "PO " + poId
        }
      ]);
  }

  // fechar PO
  await supabase
    .from("purchase_orders")
    .update({ status: "received" })
    .eq("id", poId);

  alert("Inventory Updated from PO!");
  location.reload();
}
</script>

</body>
</html>
