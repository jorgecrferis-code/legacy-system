<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Receiving</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>RECEIVING</h2>

<input id="po_id" placeholder="PO ID"><br><br>
<input id="product_id" placeholder="Product ID"><br><br>
<input id="qty" placeholder="Qty Received"><br><br>
<input id="lot" placeholder="Lot"><br><br>
<input id="exp" placeholder="Expiration Date"><br><br>

<button onclick="receive()">Receive</button>

<h2>RECEIVED ITEMS</h2>
<div id="receiving_list">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function receive(){
  const po_id = document.getElementById('po_id').value;
  const product_id = document.getElementById('product_id').value;
  const qty = document.getElementById('qty').value;
  const lot = document.getElementById('lot').value;
  const exp = document.getElementById('exp').value;

  await supabase.from('receiving').insert([{
    po_id,
    product_id,
    qty_received: qty,
    lot,
    expiration_date: exp
  }]);

  alert('Received');
  loadReceiving();
}

async function loadReceiving(){
  let { data } = await supabase
    .from('receiving')
    .select('*')
    .order('received_at', { ascending:false });

  let html = '';

  data.forEach(r => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        PO: ${r.po_id}<br>
        Product: ${r.product_id}<br>
        Qty: ${r.qty_received}<br>
        Lot: ${r.lot}<br>
        Exp: ${r.expiration_date}
      </div>
    `;
  });

  document.getElementById('receiving_list').innerHTML = html;
}

loadReceiving();
</script>

</body>
</html>
