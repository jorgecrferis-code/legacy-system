<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Barcode Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>BARCODE SCAN</h2>

<input id="barcode" placeholder="Scan barcode" autofocus onkeypress="scan(event)">
<h3 id="result"></h3>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function scan(e) {
  if (e.key === "Enter") {
    let code = document.getElementById("barcode").value;

    let { data } = await supabase
      .from("products")
      .select("*")
      .eq("barcode", code)
      .single();

    if (data) {
      document.getElementById("result").innerHTML =
        data.name + " | Stock: " + data.stock;
    } else {
      document.getElementById("result").innerHTML = "Product not found";
    }

    document.getElementById("barcode").value = "";
  }
}
</script>

</body>
</html>
