<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bin Transfer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>BIN TRANSFER</h2>

<select id="product"></select>
<select id="from_bin"></select>
<select id="to_bin"></select>
<input id="qty" type="number" placeholder="Qty">
<button onclick="transfer()">Transfer</button>

<script>
const supabase = window.supabase.createClient(
  "https://ougbokufspjduwepqepj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ"
);

loadProducts();
loadBins();

async function loadProducts() {
  let { data } = await supabase.from("products").select("*");
  let html = "";
  for (const p of data) {
    html += `<option value="${p.id}">${p.name}</option>`;
  }
  document.getElementById("product").innerHTML = html;
}

async function loadBins() {
  let { data } = await supabase.from("bins").select("*");
  let html = "";
  for (const b of data) {
    html += `<option value="${b.id}">${b.name}</option>`;
  }
  document.getElementById("from_bin").innerHTML = html;
  document.getElementById("to_bin").innerHTML = html;
}

async function transfer() {
  const product_id = document.getElementById("product").value;
  const from_bin = document.getElementById("from_bin").value;
  const to_bin = document.getElementById("to_bin").value;
  const qty = document.getElementById("qty").value;

  await supabase.from("bin_transfer").insert([
    { product_id, from_bin, to_bin, qty }
  ]);

  alert("Transfer Saved");
}
</script>

</body>
</html>
