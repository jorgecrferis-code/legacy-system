<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Packing</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PACKING</h2>

<label>Order</label><br>
<select id="order"></select>
<br><br>

<h3>Items</h3>
<table border="1" cellpadding="5">
<thead>
<tr>
<th>Product</th>
<th>Qty</th>
</tr>
</thead>
<tbody id="items"></tbody>
</table>

<br>
<button onclick="finishPacking()">READY TO LOAD</button>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadOrders();

async function loadOrders() {
  let { data } = await supabase
    .from("orders")
    .select("*")
    .eq("status", "OPEN");

  let select = document.getElementById("order");
  select.innerHTML = "";

  (data || []).forEach(o => {
    select.innerHTML += `<option value="${o.id}">Order #${o.id}</option>`;
  });

  loadItems();
}

document.getElementById("order").onchange = loadItems;

async function loadItems() {
  let orderId = document.getElementById("order").value;

  let { data } = await supabase
    .from("order_items")
    .select("*, products(name)")
    .eq("order_id", orderId);

  let html = "";

  (data || []).forEach(i => {
    html += `
      <tr>
        <td>${i.products.name}</td>
        <td>${i.qty}</td>
      </tr>
    `;
  });

  document.getElementById("items").innerHTML = html;
}

async function finishPacking() {
  let orderId = document.getElementById("order").value;

  await supabase
    .from("orders")
    .update({ status: "READY" })
    .eq("id", orderId);

  alert("Order Ready to Load");
  location.reload();
}
</script>

</body>
</html>
