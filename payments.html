<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Payments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>RECEIVE PAYMENT</h2>

<input id="invoice_id" placeholder="Invoice ID"><br><br>
<input id="customer_name" placeholder="Customer"><br><br>
<input id="amount" placeholder="Amount"><br><br>
<input id="method" placeholder="Method (Cash, Check, ACH)"><br><br>
<input id="reference" placeholder="Reference"><br><br>

<button onclick="savePayment()">Save Payment</button>

<h2>PAYMENT HISTORY</h2>
<div id="payments">Loading...</div>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function savePayment(){
  const invoice_id = document.getElementById('invoice_id').value;
  const customer_name = document.getElementById('customer_name').value;
  const amount = document.getElementById('amount').value;
  const method = document.getElementById('method').value;
  const reference = document.getElementById('reference').value;

  await supabase.from('payments').insert([{
    invoice_id,
    customer_name,
    amount,
    method,
    reference
  }]);

  alert('Payment saved');
  loadPayments();
}

async function loadPayments(){
  let { data } = await supabase
    .from('payments')
    .select('*')
    .order('payment_date', { ascending:false });

  let html = '';

  data.forEach(p => {
    html += `
      <div style="background:white; border:1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px;">
        Invoice: ${p.invoice_id}<br>
        Customer: ${p.customer_name}<br>
        Amount: <b>$${Number(p.amount).toFixed(2)}</b><br>
        Date: ${p.payment_date}<br>
        Method: ${p.method}
      </div>
    `;
  });

  document.getElementById('payments').innerHTML = html;
}

loadPayments();
</script>

</body>
</html>
