<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Payments</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; background:#f4f6f8; padding:20px;">

<h2>PAYMENTS</h2>

<table border="1" cellpadding="5">
<thead>
<tr>
<th>Invoice</th>
<th>Amount</th>
<th>Method</th>
<th>Status</th>
<th>Pay</th>
</tr>
</thead>
<tbody id="payments"></tbody>
</table>

<script>
const SUPABASE_URL = "https://ougbokufspjduwepqepj.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91Z2Jva3Vmc3BqZHV3ZXBxZXBqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MTQ2MTYsImV4cCI6MjA4ODI5MDYxNn0.5C_k0vbKSE_vgmwK9kRQkM3oR1CWoPG_BaiHbBKHOVQ";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

loadInvoices();

async function loadInvoices() {
  let { data } = await supabase
    .from("invoices")
    .select("*")
    .eq("status", "open");

  let html = "";

  for (const inv of data) {
    html += `
      <tr>
        <td>${inv.id}</td>
        <td>0</td>
        <td>Cash</td>
        <td>${inv.status}</td>
        <td>
          <button onclick="pay(${inv.id})">PAY</button>
        </td>
      </tr>
    `;
  }

  document.getElementById("payments").innerHTML = html;
}

async function pay(invoiceId) {

  await supabase
    .from("payments")
    .insert([
      {
        invoice_id: invoiceId,
        amount: 0,
        method: "cash",
        status: "paid"
      }
    ]);

  await supabase
    .from("invoices")
    .update({ status: "paid" })
    .eq("id", invoiceId);

  alert("Payment Registered!");
  location.reload();
}
</script>

</body>
</html>
